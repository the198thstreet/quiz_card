<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="과목별 카드 퀴즈를 한곳에서 고르고 바로 학습할 수 있는 스터디 카드 홈입니다. 현재는 정보처리기사 실기 카드 퀴즈를 바로 시작할 수 있습니다." />
  <meta name="robots" content="index, follow" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="스터디 카드" />
  <meta property="og:description" content="카드 퀴즈를 과목별로 모아두고 태블릿과 모바일에서 가볍게 학습할 수 있는 런처 홈입니다." />
  <meta property="og:image" content="og-image.png?v=1" />
  <meta property="og:image:alt" content="스터디 카드 공유 이미지" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="스터디 카드" />
  <meta name="twitter:description" content="과목별 카드 퀴즈를 모아두고 바로 진입할 수 있는 학습용 홈입니다." />
  <meta name="twitter:image" content="og-image.png?v=1" />
  <title>스터디 카드</title>
  <link rel="icon" href="icon.svg?v=2" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.png?v=2" />
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <div class="page-glow page-glow-left" aria-hidden="true"></div>
  <div class="page-glow page-glow-right" aria-hidden="true"></div>

  <main class="landing-shell">
    <section class="landing-hero">
      <div class="hero-copy">
        <span class="eyebrow">Study Cards</span>
        <h1>스터디 카드</h1>
        <p>정리된 카드 퀴즈를 한곳에서 고르고, 필요한 학습으로 바로 이어갈 수 있는 시작 화면입니다.</p>
      </div>

      <aside class="hero-panel">
        <span class="panel-label">Collection Status</span>
        <div class="status-display">
          <strong id="catalogSummary">불러오는 중</strong>
          <div class="status-strip" aria-hidden="true">
            <span class="status-segment status-segment-live" id="liveSegment"></span>
            <span class="status-segment status-segment-soon" id="soonSegment"></span>
          </div>
        </div>
        <div class="status-metrics">
          <div class="status-metric status-metric-live">
            <span class="status-dot" aria-hidden="true"></span>
            <div>
              <small>바로 시작</small>
              <strong id="liveCount">0</strong>
            </div>
          </div>
          <div class="status-metric status-metric-soon">
            <span class="status-dot" aria-hidden="true"></span>
            <div>
              <small>준비 중</small>
              <strong id="soonCount">0</strong>
            </div>
          </div>
        </div>
        <p id="catalogDescription">현재 열 수 있는 덱과 준비 중인 덱을 보여줍니다.</p>
      </aside>
    </section>

    <section class="launcher-section" aria-labelledby="launcherTitle">
      <div class="section-head">
        <div>
          <span class="section-kicker">Launch</span>
          <h2 id="launcherTitle">카드 퀴즈 선택</h2>
        </div>
      </div>

      <div class="quiz-grid" id="quizGrid">
        <article class="quiz-card quiz-card-loading">
          <span class="quiz-badge">Loading</span>
          <h3>카드 목록을 준비하는 중입니다</h3>
          <p>잠시만 기다리면 학습 덱 버튼이 표시됩니다.</p>
        </article>
      </div>
    </section>
  </main>

  <script src="js/home.js"></script>
</body>
</html>
